<section class="form-section">
    <div class="form-container">
        <h2>Become a Partner</h2>

        <form id="partnerForm">

            <div class="form-group">
                <label>Organization Name</label>
                <input type="text" name="organization" required>
            </div>

            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" name="contact_person" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Type of Partnership</label>
                <select name="partnership_type">
                    <option>Funding</option>
                    <option>Program Collaboration</option>
                    <option>Volunteer Support</option>
                    <option>Housing Resources</option>
                </select>
            </div>

            <div class="form-group">
                <label>How would you like to partner?</label>
                <textarea name="message" required></textarea>
            </div>

            <button type="submit" class="form-btn">
                Submit Partnership Request
            </button>

            <p id="formMessage" style="margin-top:15px;"></p>

        </form>
    </div>
</section>

  <div class="footer-container">

    <!-- Organization Info -->

    </div>

  </div>

  <div class="footer-bottom">
    © 2026 WE1A | Divinity House Support Services
  </div>

</footer>
</body>
